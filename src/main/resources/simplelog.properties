# Apache Commons Logging (JCL) SimpleLog configuration for the University Demo

# Default log level for all loggers
org.apache.commons.logging.simplelog.defaultlog=info

# Package/class-specific overrides
org.apache.commons.logging.simplelog.log.org.axonframework=debug
org.apache.commons.logging.simplelog.log.org.springframework=warn

# Output formatting
org.apache.commons.logging.simplelog.showdatetime=true
org.apache.commons.logging.simplelog.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS
org.apache.commons.logging.simplelog.showlogname=false
org.apache.commons.logging.simplelog.showShortLogname=true
org.apache.commons.logging.simplelog.showthreadname=false
